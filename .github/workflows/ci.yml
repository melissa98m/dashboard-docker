name: CI + Deploy (Raspberry Pi)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "DATABASE_URL=sqlite:////tmp/dashboard.db" >> .env
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env

      - name: Build Docker images
        run: make build

      - name: Lint API + Web
        run: make lint-ci

      - name: Format check
        run: make format-check

      - name: Run tests
        run: make test-ci

  deploy:
    needs: test
    # Only on push to main or manual trigger (skipped on PR/fork)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard-api (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dashboard-api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard-web (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dashboard-web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=
            API_UPSTREAM_URL=http://dashboard-api:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate and sanitize deploy secrets
        run: |
          SSH_HOST=$(printf '%s' "$SSH_HOST" | tr -d '\n\r' | xargs)
          SSH_USER=$(printf '%s' "$SSH_USER" | tr -d '\n\r' | xargs)
          SSH_PORT=$(printf '%s' "$SSH_PORT" | tr -d '\n\r' | xargs)
          DEPLOY_PATH=$(printf '%s' "$DEPLOY_PATH" | tr -d '\n\r' | xargs)
          [ -z "$SSH_PORT" ] && SSH_PORT=22
          if [ -z "$SSH_HOST" ]; then echo "::error::Secret SSH_HOST is empty or invalid"; exit 1; fi
          if [ -z "$SSH_USER" ]; then echo "::error::Secret SSH_USER is empty"; exit 1; fi
          if [ -z "$DEPLOY_PATH" ]; then echo "::error::Secret DEPLOY_PATH is empty"; exit 1; fi
          echo "SSH_HOST=$SSH_HOST" >> $GITHUB_ENV
          echo "SSH_USER=$SSH_USER" >> $GITHUB_ENV
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> $GITHUB_ENV
          echo "Secrets OK"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload project to Raspberry Pi
        run: |
          rsync -avz --delete -e "ssh -p $SSH_PORT" \
            --exclude='.env' --exclude='.git' --exclude='data' --exclude='backups' \
            --exclude='__pycache__' --exclude='node_modules' --exclude='.next' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy via SSH
        env:
          IMAGE_API: ghcr.io/${{ github.repository }}/dashboard-api:latest
          IMAGE_WEB: ghcr.io/${{ github.repository }}/dashboard-web:latest
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e && cd $DEPLOY_PATH && [ -f .env ] || cp .env.example .env && export COMPOSE_IMAGE_API=$IMAGE_API && export COMPOSE_IMAGE_WEB=$IMAGE_WEB && docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull && docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --remove-orphans"
