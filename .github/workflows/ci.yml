name: CI + Deploy (Raspberry Pi)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "DATABASE_URL=sqlite:////tmp/dashboard.db" >> .env
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env

      - name: Build Docker images
        run: make build

      - name: Lint API + Web
        run: make lint-ci

      - name: Format check
        run: make format-check

      - name: Run tests
        run: make test-ci

  deploy:
    needs: test
    # Only on push to main or manual trigger (skipped on PR/fork)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload project to Raspberry Pi
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            --exclude='.env' --exclude='.git' --exclude='data' --exclude='backups' \
            --exclude='__pycache__' --exclude='node_modules' --exclude='.next' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "set -e && cd ${{ secrets.DEPLOY_PATH }} && [ -f .env ] || cp .env.example .env && export COMPOSE_BAKE=false && export DOCKER_BUILDKIT=0 && docker compose build --pull && docker compose up -d --remove-orphans"
