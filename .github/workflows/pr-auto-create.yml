name: PR Auto-Create

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "DATABASE_URL=sqlite:////tmp/dashboard.db" >> .env
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env

      - name: Lint API + Web
        run: make lint-ci

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "DATABASE_URL=sqlite:////tmp/dashboard.db" >> .env
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env

      - name: Run tests
        run: make test-ci

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env

      - name: Build Docker images
        run: make build

  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR to main
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.GITHUB_REF_NAME;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              base: 'main'
            });
            if (pulls.length === 0) {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${branch}`,
                head: branch,
                base: 'main',
                body: `PR créée automatiquement par le workflow \`pr-auto-create\`.\n\nChaque push sur cette branche met à jour la PR.`
              });
              core.notice(`PR créée : ${pr.html_url}`);
            } else {
              core.notice('PR existe déjà — les derniers commits sont inclus automatiquement');
            }
